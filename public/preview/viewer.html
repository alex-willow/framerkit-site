<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview | FramerKit</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Display:wght@700&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/png" href="/Logo.png" />
  <link rel="apple-touch-icon" href="/Logo.png" />
  
  <meta name="description" content="FramerKit Component Preview" />
  <meta property="og:title" content="FramerKit Preview" />
  <meta property="og:image" content="/Logo.png" />
  
  <link rel="stylesheet" href="/preview/viewer.css" />
  <style>
    /* === CSS Variables for Theming === */
    :root {
      --bg-color: #f5f5f5;
      --toolbar-bg: #ffffff;
      --toolbar-border: #e5e7eb;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent-color: #6E3FF3;
      --button-bg: #f3f4f6;
      --button-hover: #e5e7eb;
      --button-active: #6E3FF3;
      --button-active-text: #ffffff;
      --toast-bg: #1f2937;
      --toast-text: #ffffff;
      --indicator-bg: rgba(0, 0, 0, 0.8);
      --indicator-text: #ffffff;
      --preview-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg-color: #0f0f0f;
      --toolbar-bg: #1a1a1a;
      --toolbar-border: #2a2a2a;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #6b6b6b;
      --accent-color: #a78bfa;
      --button-bg: #2a2a2a;
      --button-hover: #3a3a3a;
      --button-active: #6E3FF3;
      --button-active-text: #ffffff;
      --toast-bg: #2a2a2a;
      --toast-text: #f5f5f5;
      --indicator-bg: rgba(255, 255, 255, 0.9);
      --indicator-text: #0f0f0f;
      --preview-bg: #0f0f0f;
    }

    body {
      background: var(--bg-color);
      color: var(--text-primary);
    }

    .preview-toolbar {
      background: var(--toolbar-bg);
      border-bottom-color: var(--toolbar-border);
    }

    .logo-text {
      color: var(--text-primary);
    }

    .breadcrumb-section {
      color: var(--text-primary);
    }

    .breadcrumb-mode {
      color: var(--text-secondary);
    }

    .toolbar-divider {
      background: var(--toolbar-border);
    }

    /* device-btn и view-btn стили в viewer.css */

    .fullscreen-btn {
      color: var(--text-secondary);
    }

    .fullscreen-btn:hover {
      background: var(--button-hover);
      color: var(--text-primary);
    }

    .width-indicator {
      background: var(--indicator-bg);
      color: var(--indicator-text);
    }

    .copy-toast {
      background: var(--toast-bg);
      color: var(--toast-text);
    }

    .show-ui-btn {
      background: var(--button-active);
      color: var(--button-active-text);
    }

    .resizable-wrapper {
      background: var(--preview-bg);
    }
  </style>
</head>
<body>
  <!-- 🔥 FLEX LAYOUT: Toolbar + Preview -->
  <div class="preview-layout">
    
    <!-- 🔥 TOOLBAR -->
    <div class="preview-toolbar">
      <!-- 🔹 LEFT: Logo + FramerKit + Section Name -->
      <div class="toolbar-left">
        <a href="/" class="logo-wrapper">
          <img src="/Logo.png" alt="FramerKit" class="logo-image" width="28" height="28"/>
          <span class="logo-text">FramerKit</span>
        </a>
        <div class="toolbar-divider"></div>
        <div class="breadcrumb">
          <span class="breadcrumb-section" id="sectionName"></span>
          <span class="breadcrumb-mode" id="sectionMode">Wireframe</span>
        </div>
      </div>

      <!-- 🔹 CENTER: Preview Controls -->
      <div class="toolbar-center">
        <div class="device-toggle">
          <button class="device-btn active" data-device="desktop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span>Desktop</span>
          </button>
          <button class="device-btn" data-device="tablet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="2" width="16" height="20" rx="2"/>
            </svg>
            <span>Tablet</span>
          </button>
          <button class="device-btn" data-device="mobile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
            </svg>
            <span>Mobile</span>
          </button>
        </div>
        <div class="toolbar-divider"></div>
        <button class="fullscreen-btn" id="fullscreenBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>

      <!-- 🔹 RIGHT: View Toggle + Copy -->
      <div class="toolbar-right">
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" data-view="wireframe">Wireframe</button>
          <button class="view-btn" data-view="design">Design</button>
        </div>
        <div class="toolbar-divider"></div>
        <button class="copy-btn" id="copyBtn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span>Copy for Framer</span>
        </button>
      </div>
    </div>

    <!-- 🔥 PREVIEW CONTAINER -->
    <div class="preview-container" id="previewContainer">
      <div class="center-wrapper navbar-exception">
        <div class="resizable-wrapper desktop" id="resizableWrapper">
          <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
          </div>
          <div class="resize-handle left" id="resizeLeft"></div>
          <div class="resize-handle right" id="resizeRight"></div>
          <iframe src="" class="preview-frame" id="previewFrame" loading="lazy"></iframe>
        </div>
      </div>
      <div class="width-indicator" id="widthIndicator">1200px</div>
    </div>

  <!-- 🔘 Кнопка Show UI -->
  <button class="show-ui-btn" id="showUiBtn" title="Show UI" aria-label="Show user interface">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
    </svg>
    <span>Show UI</span>
  </button>

  <div id="copyToast" class="copy-toast">
    <span class="icon">✅</span>
    <span class="text">Component added to clipboard</span>
  </div>

  <!-- JavaScript -->
  <script>
    console.log('🔍 viewer.html loaded');

    // === Theme Management ===
    // Load theme from main site localStorage key
    function loadTheme() {
      const savedTheme = localStorage.getItem('theme');
      const theme = savedTheme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
    }

    // Initialize theme on load
    loadTheme();

    // Listen for theme changes from main site
    window.addEventListener('storage', (e) => {
      if (e.key === 'theme') {
        loadTheme();
      }
    });
    const path = window.location.pathname;
    const parts = path.split('/').filter(p => p);
  
    // === Форматирование названия ===
    let componentName = parts[parts.length - 1] || '';
    componentName = componentName.replace(/-preview$/i, '').replace(/preview$/i, '').replace(/-wireframe$/i, '-wireframe').replace(/-+/g, '-').replace(/^-|-$/g, '');
    if (!componentName) componentName = 'Component';
    const formattedTitle = componentName.split('-').map(word => {
      if (!word) return '';
      const withSpace = word.replace(/([a-zA-Z])(\d)/g, '$1 $2');
      return withSpace.charAt(0).toUpperCase() + withSpace.slice(1);
    }).filter(w => w).join(' ');
    document.title = `${formattedTitle} | FramerKit`;
  
    // === UI Elements ===
    const deviceBtns = document.querySelectorAll('.device-btn');
    const resizableWrapper = document.getElementById('resizableWrapper');
    const previewContainer = document.getElementById('previewContainer');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const resizeLeft = document.getElementById('resizeLeft');
    const resizeRight = document.getElementById('resizeRight');
    const widthIndicator = document.getElementById('widthIndicator');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const showUiBtn = document.getElementById('showUiBtn');
    const copyBtn = document.getElementById('copyBtn');
    const viewToggle = document.getElementById('viewToggle');
    const viewBtns = viewToggle ? viewToggle.querySelectorAll('.view-btn') : [];
    const previewFrame = document.getElementById('previewFrame');
    const centerWrapper = document.querySelector('.center-wrapper');
    const isNavbar = window.location.pathname.includes('navbar');

    if (centerWrapper) {
      if (isNavbar) centerWrapper.classList.add('navbar-exception');
      else centerWrapper.classList.remove('navbar-exception');
    }
    

    
    const fullscreenIcon = document.getElementById('fullscreenIcon');
    const fullscreenTooltip = document.getElementById('fullscreenTooltip');
  
    const BREAKPOINTS = { desktop: 1200, tablet: 810, mobile: 390 };
    let isFullscreen = false, isResizing = false, startX = 0, startWidth = 1200;
    let componentsData = [], currentComponent = null, displayUrl = '', componentType = 'paid';
    let indicatorTimeout = null;
    
    // 🔥 Для авто-высоты
    let lastHeight = 0;
    let heightDebounce = null;
  
    // === Иконки ===
    const ICON_COPY = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    const ICON_CHECK = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    const ICON_LOCK = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
    const ICON_ENTER_FULLSCREEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
    const ICON_EXIT_FULLSCREEN = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
  
    // === Copy Button ===
    function initCopyButton() {
      if (!copyBtn) return;
      copyBtn.classList.add('locked');
      copyBtn.classList.remove('copied');
      copyBtn.querySelector('svg').outerHTML = ICON_LOCK;
      copyBtn.style.pointerEvents = 'none';
    }
    initCopyButton();

    function showCopyToast(message = "Component added to clipboard", duration = 2000) {
  const toast = document.getElementById('copyToast');
  if (!toast) return;

  toast.querySelector('.text').textContent = message;
  toast.classList.add('show');

  setTimeout(() => {
    toast.classList.remove('show');
  }, duration);
}

function showCopiedState() {
  if (!copyBtn) return;

  copyBtn.querySelector('svg').outerHTML = ICON_CHECK;
  copyBtn.classList.add('copied');

  // 🔥 Показываем toast
  showCopyToast();

  setTimeout(() => {
    copyBtn.classList.remove('copied');
    copyBtn.querySelector('svg').outerHTML = ICON_COPY;
  }, 2000);
}
  
    // === МАППИНГ ===
    const sectionToJsonKey = {
      'hero-section': 'hero', 'navbar-section': 'navbar', 'footer-section': 'footer',
      'feature-section': 'feature', 'logo-section': 'logo', 'gallery-section': 'gallery',
      'testimonial-section': 'testimonial', 'contact-section': 'contact',
      'pricing-section': 'pricing', 'faq-section': 'faq', 'cta-section': 'cta',
    };
  
    // === Загрузка JSON ===
    async function loadComponentsData() {
      const urlSection = parts[1] || 'hero';
      const jsonKey = sectionToJsonKey[urlSection] || urlSection;
      const jsonUrl = `https://raw.githubusercontent.com/alex-willow/framerkit-data/main/${jsonKey}.json`; // ✅ Убраны пробелы
      
      try {
        const res = await fetch(jsonUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        componentsData = json[jsonKey] || json.components || [];
        findAndPrepareComponent();
      } catch (err) {
        console.error('❌ JSON load failed:', err);
      }
    }
  
    // === Найти компонент ===
    function findAndPrepareComponent() {
      const urlKey = parts[parts.length - 1] || '';
      const isWireframeMode = urlKey.includes('-wireframe');
      const cleanKey = urlKey.replace(/-wireframe$/i, '').replace(/-preview$/i, '');
      
      currentComponent = componentsData.find(item => {
        const k = item.key || '';
        return k === cleanKey || k === urlKey;
      });
      
      if (currentComponent) {
        console.log('✅ Found:', currentComponent.key);
        const wireframeUrl = currentComponent.wireframe?.url;
        const regularUrl = currentComponent.url;
        displayUrl = (isWireframeMode && wireframeUrl) ? wireframeUrl : regularUrl;
        displayUrl = (displayUrl || '').trim();
        componentType = currentComponent.type || 'paid';
        console.log('🔗 Type:', componentType);
        const sectionNameEl = document.getElementById('sectionName');
        if (sectionNameEl && currentComponent.title) {
          sectionNameEl.textContent = currentComponent.title;
        }
        updateCopyButton();
        updateViewToggle();
      } else {
        console.warn('⚠️ Component NOT found');
        displayUrl = '/preview/' + parts.slice(1).join('/');
        const sectionNameEl = document.getElementById('sectionName');
        if (sectionNameEl) {
          sectionNameEl.textContent = formattedTitle;
        }
      }
    }
  
    // === Загрузка iframe ===
    const componentPath = '/preview/' + parts.slice(1).join('/');
    previewFrame.src = displayUrl || componentPath;
    previewFrame.style.pointerEvents = 'none';
  
// 🔥 Единый обработчик load — сначала высота, ПОТОМ показ
// 🔥 Единый обработчик load — сначала высота, ПОТОМ показ
previewFrame.addEventListener('load', () => {
  console.log('🔄 iframe loaded');
  
  // 🔥 Функция проверки: все ли картинки загрузились
  const checkImagesLoaded = () => {
    try {
      const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      if (!iframeDoc) return false;
      const images = iframeDoc.querySelectorAll('img');
      return Array.from(images).every(img => img.complete && img.naturalHeight !== 0);
    } catch (e) {
      return false;
    }
  };
  
  // 🔥 Ждём пока контент полностью готов
  const waitForReady = (retries = 0, maxRetries = 30) => {
    if (checkImagesLoaded() || retries >= maxRetries) {
      // 🔥 1. Сначала вычисляем высоту (невидимо)
      updateIframeHeight();
      
      // 🔥 2. Ждём 50ms чтобы высота применилась
      setTimeout(() => {
        // 🔥 3. ТОЛЬКО ТЕПЕРЬ показываем контент — сразу с правильной высотой!
        resizableWrapper.classList.add('loaded');
        
        // 🔥 Скрываем overlay
        if (loadingOverlay) {
          loadingOverlay.style.opacity = '0';
          setTimeout(() => { loadingOverlay.style.display = 'none'; }, 300);
        }
        
        previewFrame.style.pointerEvents = 'auto';
      }, 50);
    } else {
      // 🔥 Ещё ждём 100ms и пробуем снова
      setTimeout(() => waitForReady(retries + 1, maxRetries), 100);
    }
  };
  
  // 🔥 Начинаем проверку через 200ms
  setTimeout(() => waitForReady(), 200);
});
  


  
function updateIframeHeight() {
  try {
    const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
    if (!iframeDoc) return;

    const componentRoot =
      iframeDoc.querySelector('[data-framer-root]') ||
      iframeDoc.querySelector('#main > section, #main > div') ||
      iframeDoc.querySelector('#main');
    const framerRoot = componentRoot || iframeDoc.body;
    if (!framerRoot) return;

    const isNavbar = window.location.pathname.includes('navbar');
    if (!isNavbar) {
      framerRoot.style.setProperty('min-height', 'auto', 'important');
      framerRoot.style.setProperty('height', 'auto', 'important');
    }

    const rootRect = framerRoot.getBoundingClientRect();
    const main = iframeDoc.querySelector('#main');
    const componentMeasurements = [
      framerRoot.scrollHeight || 0,
      framerRoot.offsetHeight || 0,
      rootRect.height || 0,
      main?.scrollHeight || 0,
      main?.offsetHeight || 0,
    ];
    const fallbackMeasurements = componentRoot
      ? []
      : [
          iframeDoc.body?.scrollHeight || 0,
          iframeDoc.documentElement?.scrollHeight || 0,
        ];
    const contentHeight = Math.max(...componentMeasurements, ...fallbackMeasurements);

    let newHeight;

    if (isNavbar) {
      newHeight = Math.max(contentHeight, 600);
      setPreviewHeight(newHeight);
      return;
    }

    if (isFullscreen) {
      newHeight = Math.max(contentHeight, window.innerHeight - 60);
    } else {
      newHeight = Math.max(contentHeight, 300);
    }

    // 🔹 Округляем вниз, чтобы дробные пиксели не прыгали
    newHeight = Math.floor(newHeight);

    setPreviewHeight(newHeight);

  } catch (e) {
    console.log('⚠️ CORS blocks iframe access:', e);
  }
}
  
function updatePreviewAlignment(height) {
  if (!centerWrapper || !previewContainer) return;
  const availableHeight = Math.max(0, previewContainer.clientHeight - 40);
  centerWrapper.classList.toggle('content-overflows', height > availableHeight);
}

function setPreviewHeight(height) {
  const newHeight = Math.max(Math.floor(height), 300);
  updatePreviewAlignment(newHeight);

  if (Math.abs(newHeight - lastHeight) > 2) {
    requestAnimationFrame(() => {
      resizableWrapper.style.height = newHeight + 'px';
      lastHeight = newHeight;
    });
  }
}

    // 🔥 Слушаем postMessage от iframe
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'resize') {
        const newHeight = Number(event.data.height);
        if (heightDebounce) clearTimeout(heightDebounce);
        
        heightDebounce = setTimeout(() => {
          if (Number.isFinite(newHeight) && newHeight > 0) {
            setPreviewHeight(newHeight);
            console.log('✅ Height from postMessage:', newHeight + 'px');
          }
        }, 100);
      }
    });
  
    // === Авторизация ===
    function checkAuth() {
      const email = localStorage.getItem('rememberedEmail');
      const key = localStorage.getItem('rememberedKey');
      return !!(email && key);
    }
  
    // === Copy Button state ===
    function updateCopyButton() {
      if (!copyBtn) return;
      if (!componentType) return;
      const email = localStorage.getItem('rememberedEmail');
      const key = localStorage.getItem('rememberedKey');
      const isAuthenticated = !!(email && key);
      const canCopy = isAuthenticated || componentType === 'free';
      
      copyBtn.classList.remove('copied', 'locked');
      if (!canCopy) {
        copyBtn.classList.add('locked');
        copyBtn.querySelector('svg').outerHTML = ICON_LOCK;
        copyBtn.style.pointerEvents = 'none';
      } else {
        copyBtn.querySelector('svg').outerHTML = ICON_COPY;
        copyBtn.style.pointerEvents = 'auto';
      }
    }
  
    // === View Toggle ===
    function updateViewToggle() {
      if (!viewToggle) return;
      const isWireframe = window.location.pathname.includes('-wireframe');
      viewBtns.forEach(btn => {
        const isTarget = btn.dataset.view === (isWireframe ? 'wireframe' : 'design');
        btn.classList.toggle('active', isTarget);
      });
    }
  
    if (viewToggle) {
      viewBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (copyBtn) {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('svg').outerHTML = ICON_COPY;
          }
          const currentPath = window.location.pathname;
          const targetView = btn.dataset.view;
          const isWireframe = currentPath.includes('-wireframe');
          let newPath = currentPath;
          if (targetView === 'wireframe' && !isWireframe) {
            const lastSegment = parts[parts.length - 1];
            newPath = currentPath.replace(lastSegment, lastSegment + '-wireframe');
          } else if (targetView === 'design' && isWireframe) {
            newPath = currentPath.replace('-wireframe', '');
          }
          if (newPath !== currentPath) window.location.href = newPath;
        });
      });
    }
  
    // === Copy click ===
    if (copyBtn) {
      copyBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        if (!currentComponent || !displayUrl) {
          await new Promise(resolve => setTimeout(resolve, 300));
          if (!currentComponent) findAndPrepareComponent();
        }
        if (!currentComponent || !displayUrl) {
          await navigator.clipboard.writeText(componentPath);
          showCopiedState();
          return;
        }
        if (!checkAuth() && componentType === 'paid') {
          window.location.href = 'https://www.framerkit.site?signin=true'; // ✅ Убраны пробелы
          return;
        }
        try {
          await navigator.clipboard.writeText(displayUrl);
          showCopiedState();
        } catch (err) {
          console.error('❌ Copy failed:', err);
        }
      });
    }
  
    function showCopiedState() {
        if (!copyBtn) return;

        copyBtn.querySelector('svg').outerHTML = ICON_CHECK;
        copyBtn.classList.add('copied');

        // 🔥 Показываем toast
        showCopyToast("Component added to clipboard");

        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('svg').outerHTML = ICON_COPY;
        }, 2000);
      }
  
    // === Device logic ===
    function getClosestDevice(width) {
      if (width >= 1200) return 'desktop';
      if (width >= 810) return 'tablet';
      return 'mobile';
    }
    
    function updateActiveDeviceBtn(width) {
      const closest = getClosestDevice(width);
      deviceBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.device === closest));
    }
    
    function showWidthIndicator(width) {
      widthIndicator.textContent = Math.round(width) + 'px';
      if (indicatorTimeout) {
        clearTimeout(indicatorTimeout);
      } else {
        widthIndicator.classList.add('show');
      }
      indicatorTimeout = setTimeout(() => {
        widthIndicator.classList.remove('show');
        indicatorTimeout = null;
      }, 2000);
      updateActiveDeviceBtn(width);
    }
    
function setWidth(width) {
  const containerWidth = previewContainer.clientWidth - 40; // padding
  const finalWidth = Math.min(width, containerWidth);       // никогда не выше
  resizableWrapper.style.flex = (finalWidth === width) ? 'none' : '1';
  resizableWrapper.style.width = finalWidth + 'px';

  showWidthIndicator(finalWidth);
  updateActiveDeviceBtn(finalWidth);

  // 🔹 Обновляем высоту
  requestAnimationFrame(() => updateIframeHeight());
}
    
    deviceBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const device = btn.dataset.device;
        if (isFullscreen) toggleFullscreen();
        deviceBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        setWidth(BREAKPOINTS[device]);
        
        // 🔥 Дополнительно: форсируем пересчёт высоты после смены устройства
        setTimeout(() => {
          updateIframeHeight();
        }, 300);
      });
    });
  
   // === Fullscreen ===
if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
});

// 🔹 Сохраняем ширину перед fullscreen
let prevWidth = resizableWrapper.offsetWidth;

function toggleFullscreen() {
  isFullscreen = !isFullscreen;
  previewContainer.classList.toggle('fullscreen');
  resizableWrapper.classList.toggle('fullscreen');

  const toolbar = document.querySelector('.preview-toolbar');

  if (isFullscreen) {
    // сохраняем текущую ширину
    prevWidth = resizableWrapper.offsetWidth;

    // скрываем toolbar
    if (toolbar) {
      toolbar.style.opacity = '0';
      toolbar.style.pointerEvents = 'none';
    }

    if (showUiBtn) showUiBtn.classList.add('visible');

    // снимаем активность со всех device кнопок
    deviceBtns.forEach(btn => btn.classList.remove('active'));
  } else {
    // показываем toolbar
    if (toolbar) {
      toolbar.style.opacity = '1';
      toolbar.style.pointerEvents = 'auto';
    }

    if (showUiBtn) showUiBtn.classList.remove('visible');

    // 🔹 НЕ меняем устройство — просто пересчитываем высоту для текущей ширины
    setWidth(prevWidth);
  }

  // Обновляем иконку fullscreen
  if (fullscreenIcon && fullscreenTooltip) {
    if (isFullscreen) {
      fullscreenIcon.innerHTML = ICON_EXIT_FULLSCREEN;
      fullscreenTooltip.textContent = 'Exit Fullscreen';
    } else {
      fullscreenIcon.innerHTML = ICON_ENTER_FULLSCREEN;
      fullscreenTooltip.textContent = 'Fullscreen';
    }
  }
}

// 🔹 Кнопка Show UI возвращает fullscreen в нормальное состояние
if (showUiBtn) {
  showUiBtn.addEventListener('click', () => {
    if (isFullscreen) toggleFullscreen();
  });
}
  
    // === Resize horizontal ===
    function initResize(handle, side) {
      handle.addEventListener('pointerdown', e => {
        isResizing = true;
        startX = e.clientX;
        startWidth = resizableWrapper.offsetWidth;
        resizableWrapper.classList.add('no-transition');
        handle.classList.add('active');
        handle.setPointerCapture(e.pointerId);
        document.addEventListener('pointermove', onResize);
        document.addEventListener('pointerup', stopResize);
        e.preventDefault();
      });
      function onResize(e) {
        if (!isResizing) return;
        let delta = e.clientX - startX;
        let newWidth = startWidth + (side === 'right' ? delta * 2 : -delta * 2);
        newWidth = clamp(newWidth, 320, 1920);
        setWidth(newWidth);
      }
      function stopResize(e) {
        isResizing = false;
        resizableWrapper.classList.remove('no-transition');
        setTimeout(() => { previewFrame.style.pointerEvents = 'auto'; }, 10);
        handle.classList.remove('active');
        document.removeEventListener('pointermove', onResize);
        document.removeEventListener('pointerup', stopResize);
        try { handle.releasePointerCapture(e.pointerId); } catch {}
      }
    }
    initResize(resizeLeft, 'left');
    initResize(resizeRight, 'right');
  
    // === Back ===
    document.getElementById('backBtn')?.addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else {
        window.location.href = 'https://www.framerkit.site'; // ✅ Убраны пробелы
      }
    });
  
    // === Адаптив окна ===
    window.addEventListener('resize', () => {
      const containerWidth = previewContainer.clientWidth - 40;
      const currentWidth = resizableWrapper.offsetWidth;
      if (currentWidth > containerWidth) {
        resizableWrapper.style.flex = '1';
        resizableWrapper.style.width = containerWidth + 'px';
        showWidthIndicator(containerWidth);
        updateActiveDeviceBtn(containerWidth);
      }
      // 🔥 Запросить новую высоту при ресайзе окна
      updateIframeHeight();
    });
  
    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      setWidth(BREAKPOINTS.desktop);
      deviceBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.device === 'desktop'));
      updateViewToggle();
      loadComponentsData();
    });
  
    // === Pointer events ===
    resizableWrapper.addEventListener('mouseenter', () => { 
      if (!isResizing) previewFrame.style.pointerEvents = 'auto'; 
    });
    
    function clamp(value, min, max) { return Math.max(min, Math.min(value, max)); }
  </script>
