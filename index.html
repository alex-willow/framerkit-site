    <!-- === ПРЕДЗАГРУЗКА ШРИФТОВ === -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"

      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"

    <!-- === STRUCTURED DATA (JSON-LD) === -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FramerKit",
      "url": "https://www.framerkit.site/",
      "description": "Premium UI components and templates for Framer",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.framerkit.site/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FramerKit",
      "url": "https://www.framerkit.site/",
      "logo": "https://www.framerkit.site/Logo.png",
      "sameAs": [
        "https://twitter.com/framerkit",
        "https://www.framer.com/@framerkit"
      ]
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "FramerKit",
      "description": "Premium UI components, sections, and templates for Framer",
      "brand": {
        "@type": "Brand",
        "name": "FramerKit"
      },
      "offers": {
        "@type": "Offer",
        "url": "https://www.framerkit.site",
        "priceCurrency": "USD",
        "price": "50.00",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "127"
      }
    }
    </script>

    <!-- === ANTI-JUMP FIX (без скачка мобильной версии) === -->
    <style>
      .main {
        display: flex;
        flex-direction: row;
        width: 100%;
      }
      .sidebar {
        width: 200px;
      }
      @media (max-width: 767px) {
        .sidebar {
          display: none;
        }
      }
    </style>

    <!-- === PREVIEW REDIRECT SCRIPT === -->
    <script>
      (function() {
        if (window.location.pathname.startsWith('/preview/')) {
          var path = window.location.pathname;
          if (!path.endsWith('.html')) {
            var newPath = path.endsWith('/') ? path + 'index.html' : path + '/index.html';
            window.location.replace(newPath);
            return;
          }
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
